<!DOCTYPE html>
<html>
<head>
<title>Happy Letter Match!</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
}

.game-container {
    margin-top: 50px;
}

.big-letter {
    font-size: 120px;
    color: #ff3366;
}

.small-letter {
    font-size: 50px;
    margin: 10px;
    padding: 10px 20px;
    background: #d1c4e9;
    border-radius: 20px;
    display: inline-block;
    cursor: pointer;
}

.small-letter:hover {
    background: #b39ddb;
}

.hidden {
    display: none;
}

.happy {
    font-size: 30px;
    color: green;
}
</style>
</head>

<body>

<h1>🌈 Happy Letter Match!</h1>

<div id="game"></div>

<script>
let questions = [
    {big:"A", options:["c","d","e","a","b"], correct:"a"},
    {big:"B", options:["a","b","c","d","e"], correct:"b"},
    {big:"C", options:["c","a","b","d","e"], correct:"c"},
    {big:"D", options:["a","d","b","c","e"], correct:"d"},
    {big:"E", options:["e","a","b","c","d"], correct:"e"},
    {big:"A", options:["b","c","a","d","e"], correct:"a"},
    {big:"B", options:["e","d","c","b","a"], correct:"b"},
    {big:"C", options:["a","c","b","e","d"], correct:"c"},
    {big:"D", options:["d","a","c","b","e"], correct:"d"},
    {big:"E", options:["b","e","a","c","d"], correct:"e"}
];

let current = 0;

function loadQuestion() {
    let q = questions[current];

    let html = `
        <div class="game-container">
            <div class="big-letter" id="big">${q.big}</div>
            <div id="options">
                ${q.options.map(o =>
                    `<div class="small-letter" onclick="checkAnswer('${o}')">${o}</div>`
                ).join("")}
            </div>
            <div id="message"></div>
        </div>
    `;

    document.getElementById("game").innerHTML = html;
}

function checkAnswer(letter) {
    let q = questions[current];

    if(letter === q.correct) {
        document.getElementById("message").innerHTML = "🎉 Yay! Great Job!";
        document.getElementById("big").innerHTML = q.big + " " + letter;

        setTimeout(() => {
            current++;
            if(current < questions.length){
                loadQuestion();
            } else {
                document.getElementById("game").innerHTML =
                    "<h2>🌟 You Finished! Amazing!</h2>";
            }
        }, 1200);
    } else {
        document.getElementById("message").innerHTML = "😊 Try Again!";
    }
}

loadQuestion();
</script>

</body>
</html>
