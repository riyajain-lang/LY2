<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where's My Home?</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
}
body{
  background:url("assets/background-animal-kingdom.png") center/cover no-repeat;
}

#splash{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
#splash img{
  width:180px;
  max-width:55vw;
}

.game{
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  padding:12px;
}

.box{
  width:92%;
  max-width:720px;
  min-height:78vh;
  background:rgba(255,255,255,0.95);
  border-radius:24px;
  padding:16px;
  text-align:center;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

h1{
  margin:4px 0;
  font-size:clamp(26px,5vw,42px);
  color:#2b7a3d;
}
.instruction{
  font-size:clamp(18px,3.5vw,26px);
  font-weight:bold;
  color:#444;
}

.home-img{
  width:180px;
  height:135px;
  object-fit:contain;
  margin:12px auto 6px;
}

.options{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}
.option{
  width:30%;
  min-width:120px;
  max-width:170px;
  background:white;
  border:4px solid #ffd36b;
  border-radius:20px;
  padding:10px;
  cursor:pointer;
  transition:0.2s;
}
.option img{
  width:100%;
  height:105px;
  object-fit:contain;
  display:block;
}

.wiggle{
  animation:wiggle 0.35s;
}
@keyframes wiggle{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
}
.glow{
  border-color:#28a745;
  box-shadow:0 0 20px #28a745;
}
.tick{
  font-size:42px;
  color:#1ba84a;
  font-weight:bold;
  min-height:50px;
}

#final{
  display:none;
}
.final-title{
  font-size:clamp(34px,7vw,58px);
  color:#1ba84a;
  font-weight:bold;
}
button{
  border:none;
  background:#ff9f1c;
  color:white;
  padding:14px 28px;
  border-radius:18px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}

@media(max-width:520px){
  .box{min-height:84vh;padding:12px}
  .options{gap:8px}
  .option{min-width:95px;width:31%;padding:6px}
  .option img{height:82px}
  .home-img{width:135px;height:105px}
}
</style>
</head>

<body>

<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div class="game" id="game">
  <div class="box">
    <div>
      <h1>Where's My Home?</h1>
      <div class="instruction">Tap the animal that belong here.</div>
    </div>

    <div>
      <img id="homeImg" class="home-img" src="">
    </div>

    <div id="options" class="options"></div>
    <div id="feedback" class="tick"></div>
  </div>
</div>

<div class="game" id="final">
  <div class="box" style="justify-content:center;gap:25px;">
    <div class="final-title">Good Job!</div>
    <div style="font-size:28px;font-weight:bold;">You completed the game!</div>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<canvas id="confetti"></canvas>

<audio id="claps" src="assets/claps.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>
const questions = [
  {home:"forest", options:["tiger","cow","whale"], answer:"tiger"},
  {home:"sky", options:["pig","parrot","dog"], answer:"parrot"},
  {home:"home", options:["cow","dog","pig"], answer:"dog"},
  {home:"ocean", options:["dog","butterfly","octopus"], answer:"octopus"},
  {home:"forest", options:["dear","cat","octopus"], answer:"dear"},
  {home:"ocean", options:["tiger","pig","whale"], answer:"whale"},
  {home:"sky", options:["dear","cat","butterfly"], answer:"butterfly"},
  {home:"home", options:["cat","dear","whale"], answer:"cat"}
];

let shuffled = [];
let current = 0;
let wrongTries = 0;

const game = document.getElementById("game");
const final = document.getElementById("final");
const homeImg = document.getElementById("homeImg");
const optionsBox = document.getElementById("options");
const feedback = document.getElementById("feedback");
const claps = document.getElementById("claps");
const wrong = document.getElementById("wrong");

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  startGame();
},2000);

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function startGame(){
  shuffled = shuffle([...questions]);
  current = 0;
  game.style.display="flex";
  final.style.display="none";
  showQuestion();
}

function showQuestion(){
  wrongTries = 0;
  feedback.innerHTML = "";
  const q = shuffled[current];

  homeImg.src = `assets/${q.home}.png`;

  optionsBox.innerHTML = "";
  shuffle([...q.options]).forEach(opt=>{
    const div = document.createElement("div");
    div.className = "option";
    div.dataset.name = opt;
    div.innerHTML = `<img src="assets/${opt}.png" alt="${opt}">`;
    div.onclick = () => checkAnswer(div,opt);
    optionsBox.appendChild(div);
  });
}

function checkAnswer(el,opt){
  const q = shuffled[current];

  if(opt === q.answer){
    feedback.innerHTML = "✓ Good Job!";
    el.classList.add("glow");
    claps.currentTime = 0;
    claps.play().catch(()=>{});
    setTimeout(nextQuestion,1200);
  } else {
    wrongTries++;
    wrong.currentTime = 0;
    wrong.play().catch(()=>{});
    el.classList.add("wiggle");
    setTimeout(()=>el.classList.remove("wiggle"),400);

    if(wrongTries >= 2){
      document.querySelectorAll(".option").forEach(o=>{
        if(o.dataset.name === q.answer){
          o.classList.add("glow");
        }
      });
      setTimeout(nextQuestion,1500);
    }
  }
}

function nextQuestion(){
  current++;
  if(current >= shuffled.length){
    showFinal();
  } else {
    showQuestion();
  }
}

function showFinal(){
  game.style.display="none";
  final.style.display="flex";
  launchConfetti();
}

function restartGame(){
  stopConfetti();
  startGame();
}

const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
let confetti = [];
let confettiTimer;

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function launchConfetti(){
  confetti = [];
  for(let i=0;i<120;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      r:Math.random()*6+4,
      s:Math.random()*3+2
    });
  }
  confettiTimer = setInterval(drawConfetti,25);
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.fillStyle = ["#ff595e","#ffca3a","#8ac926","#1982c4","#6a4c93"][Math.floor(Math.random()*5)];
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fill();
    c.y += c.s;
    if(c.y > canvas.height) c.y = -10;
  });
}

function stopConfetti(){
  clearInterval(confettiTimer);
  ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
