<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Game</title>

<style>
body { margin:0; font-family:Arial; background:white; text-align:center; }

#splash {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:white;
}

#game { display:none; }

.options {
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.option {
  width:30%;
  background:white;
  border-radius:12px;
  padding:8px;
  cursor:pointer;
  position:relative;
}

.option img {
  width:100%;
  height:180px;
  object-fit:contain;
}

.correctMark, .wrongMark {
  position:absolute;
  top:5px;
  right:5px;
  font-size:28px;
  display:none;
}

.correctMark { color:green; }
.wrongMark { color:red; }

.hint { border:3px solid orange; }

#scoreScreen { display:none; font-size:24px; padding-top:50px; }
</style>
</head>

<body>

<div id="splash">
  <h2>Loading Game...</h2>
</div>

<div id="game">
  <h3 id="question"></h3>
  <div id="options" class="options"></div>
</div>

<div id="scoreScreen">
  <div id="finalScore"></div>
  <button onclick="restartGame()">Play Again</button>
</div>

<!-- ✅ RELATIVE PATHS -->
<audio id="correctSound" src="./assets/correct.mp3"></audio>
<audio id="wrongSound" src="./assets/wrong.mp3"></audio>

<script>
const basePath = "./assets/";

const questions = [
{q:"Identify the elephant", correct:"elephant", options:["elephant","cat","monkey"]},
{q:"Identify the lion", correct:"lion", options:["lion","giraffe","cat"]},
{q:"Identify the cow", correct:"cow", options:["cow","pig","cat"]},
{q:"Identify the pig", correct:"pig", options:["pig","sheep","monkey"]},
{q:"Identify the giraffe", correct:"giraffe", options:["giraffe","lion","cat"]},
{q:"Identify the monkey", correct:"monkey", options:["monkey","lion","giraffe"]},
{q:"Identify the sheep", correct:"sheep", options:["sheep","giraffe","monkey"]},
{q:"Identify the cat", correct:"cat", options:["cat","cow","lion"]}
];

let current=0, score=0;

function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function loadQuestion(){
  let q=questions[current];
  document.getElementById("question").innerText=q.q;

  let optDiv=document.getElementById("options");
  optDiv.innerHTML="";

  q.options.sort(()=>Math.random()-0.5).forEach(opt=>{
    let div=document.createElement("div");
    div.className="option";

    div.innerHTML=`
      <span class="correctMark">✔</span>
      <span class="wrongMark">✖</span>
      <img src="${basePath + opt}.png">
      <p>${opt}</p>
    `;

    div.onclick=()=>checkAnswer(opt,div);
    optDiv.appendChild(div);
  });

  speak(q.correct);
}

function checkAnswer(selected,el){
  let correct=questions[current].correct;

  if(selected===correct){
    el.querySelector(".correctMark").style.display="block";
    document.getElementById("correctSound").play();

    score++; current++;

    setTimeout(()=>{
      current<questions.length ? loadQuestion() : showScore();
    },800);
  }else{
    el.querySelector(".wrongMark").style.display="block";
    document.getElementById("wrongSound").play();
  }
}

function showScore(){
  document.getElementById("game").style.display="none";
  document.getElementById("scoreScreen").style.display="block";
  document.getElementById("finalScore").innerHTML =
    `Score: ${score}/${questions.length}`;
}

function restartGame(){
  current=0;
  score=0;
  document.getElementById("scoreScreen").style.display="none";
  document.getElementById("game").style.display="block";
  loadQuestion();
}

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadQuestion();
},2000);
</script>

</body>
</html>
