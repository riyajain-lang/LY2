<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preschool Counting Game</title>
<style>
@font-face {
    font-family: 'CustomFont';
    src: url('assets/98ab80fc-ba2a-4970-a238-f3ad6cce0074.png'); /* replace with actual font file if .ttf/.woff */
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'CustomFont', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f0f0;
    overflow: hidden;
}

#game-container {
    width: 100%;
    max-width: 700px;
    height: 90%;
    max-height: 800px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    text-align: center;
    border-radius: 20px;
    padding: 10px;

    /* Doodle-style border */
    border: 30px solid transparent;
    border-image: url('assets/e1e3e2da-1ef6-42b3-a053-9aabc77248ba.png') 50 round;
}

.slide {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
}

#instructions {
    font-size: 1.6em;
    font-weight: bold;
    color: #000;
    margin-bottom: 15px;
    padding: 10px 20px;
    border: 4px solid #008000;
    border-radius: 12px;
    background-color: #e0ffe0;
}

#slide-1-content {
    display: flex;
    justify-content: space-between;
    width: 100%;
    align-items: center;
    flex-grow: 1;
    padding: 10px;
    background: linear-gradient(135deg, #fef6e4, #d0f0c0);
    border-radius: 15px;
}

#question-img {
    width: 55%;
    height: auto;
    max-height: 500px;
    margin-left: 10px;
}

.options {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 35%;
}

.option-btn {
    padding: 25px 30px;
    font-size: 1.8em;
    margin: 12px;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    background-color: #FFCCFF;
    transition: transform 0.2s, box-shadow 0.2s;
}

.option-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.correct {
    background-color: #8BC34A !important;
    color: #fff;
}

.wrong {
    animation: wiggle 0.3s;
}

@keyframes wiggle {
    0% { transform: rotate(0deg);}
    25% { transform: rotate(5deg);}
    50% { transform: rotate(-5deg);}
    75% { transform: rotate(5deg);}
    100% { transform: rotate(0deg);}
}

#feedback {
    font-size: 1.5em;
    margin-top: 15px;
    color: #333;
}

#play-again {
    display: none;
    padding: 18px 28px;
    font-size: 1.6em;
    margin-top: 20px;
    border: none;
    border-radius: 15px;
    background-color: #1CB6BB;
    color: #fff;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="game-container">
    <!-- Slide 0: Logo White -->
    <div class="slide" id="slide-0" style="background:white;">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <!-- Slide 1+: Questions with colored background -->
    <div class="slide" id="slide-1">
        <div id="instructions">Count the objects and tap on the correct number.</div>
        <div id="slide-1-content">
            <img id="question-img" src="" alt="Question">
            <div class="options" id="options-container"></div>
        </div>
        <div id="feedback"></div>
    </div>

    <!-- Slide End -->
    <div class="slide" id="slide-end">
        <div id="feedback">🎉 Congratulations! 🎉</div>
        <button id="play-again">Play Again</button>
    </div>
</div>

<audio id="audio-correct" src="assets/correct.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-clap" src="assets/freesound_community-claps-44774.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
const slides = document.querySelectorAll('.slide');
const questionImg = document.getElementById('question-img');
const optionsContainer = document.getElementById('options-container');
const feedbackEl = document.getElementById('feedback');
const playAgainBtn = document.getElementById('play-again');

const correctAudio = document.getElementById('audio-correct');
const wrongAudio = document.getElementById('audio-wrong');
const clapAudio = document.getElementById('audio-clap');

let currentSlide = 0;
let attempts = 0;

const questions = [
    {img: "assets/panda.png", answer: "11", options: ["11","12","13"]},
    {img: "assets/rocket.png", answer: "12", options: ["11","12","14"]},
    {img: "assets/lion.png", answer: "13", options: ["12","13","14"]},
    {img: "assets/dragon.png", answer: "14", options: ["13","14","15"]},
    {img: "assets/starfish.png", answer: "15", options: ["14","15","13"]},
    {img: "assets/icecream.png", answer: "12", options: ["12","14","11"]},
    {img: "assets/butterfly.png", answer: "14", options: ["14","15","13"]},
    {img: "assets/pen.png", answer: "13", options: ["11","13","12"]},
];

function shuffleArray(array) { return array.sort(() => Math.random() - 0.5); }
let shuffledQuestions = shuffleArray([...questions]);

function showSlide(index){
    slides.forEach(s => s.style.display = 'none');
    slides[index].style.display = 'flex';
}

function startGame() {
    currentSlide = 1;
    attempts = 0;
    shuffledQuestions = shuffleArray([...questions]);
    showSlide(currentSlide);
    loadQuestion();
}

function loadQuestion() {
    attempts = 0;
    feedbackEl.innerText = '';
    const q = shuffledQuestions[currentSlide - 1];
    questionImg.src = q.img;

    optionsContainer.innerHTML = '';
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.classList.add('option-btn');
        btn.innerText = opt;
        btn.addEventListener('click', () => checkAnswer(opt, btn));
        optionsContainer.appendChild(btn);
    });
}

function checkAnswer(selected, btn) {
    const q = shuffledQuestions[currentSlide - 1];
    if(selected === q.answer){
        btn.classList.add('correct');
        feedbackEl.innerText = 'Good Job!';
        correctAudio.play();
        setTimeout(() => nextQuestion(), 1000);
    } else {
        attempts++;
        btn.classList.add('wrong');
        wrongAudio.play();
        setTimeout(() => btn.classList.remove('wrong'), 300);
        if(attempts>=2){
            const correctBtn = Array.from(optionsContainer.children).find(b=>b.innerText===q.answer);
            correctBtn.classList.add('correct');
        }
    }
}

function nextQuestion(){
    if(currentSlide < shuffledQuestions.length){
        currentSlide++;
        loadQuestion();
    } else { endGame(); }
}

function endGame(){
    showSlide(slides.length-1);
    clapAudio.play();
    confetti({particleCount:150, spread:70, origin:{y:0.6}});
}

playAgainBtn.addEventListener('click', () => { startGame(); });

// Show first slide white logo for 2 seconds
showSlide(0);
setTimeout(() => { startGame(); }, 2000);
</script>
</body>
</html>
