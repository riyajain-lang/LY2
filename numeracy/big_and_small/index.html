<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big and Small Game</title>
  <!-- Google Fonts Arbutus -->
  <link href="https://fonts.googleapis.com/css2?family=Arbutus&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Arbutus', cursive;
      background-color: #B0E0E6; /* Powder blue background */
      color: #4B3832; /* Dark cocoa text */
      overflow: hidden;
    }
    #logoScreen, #gameScreen, #resultScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #logoScreen {
      background-color: #fff;
      display: flex;
    }
    img {
      max-width: 80%;
      max-height: 60%;
    }
    .question-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      gap: 50px;
      flex-wrap: wrap;
    }
    .option {
      position: relative;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .option img {
      width: 150px;
      height: auto;
      border-radius: 15px;
    }
    .glow-ring {
      position: absolute;
      top: -10px;
      left: -10px;
      width: calc(100% + 20px);
      height: calc(100% + 20px);
      border: 5px solid yellow;
      border-radius: 20px;
      box-shadow: 0 0 20px 5px yellow;
      pointer-events: none;
    }
    .tick {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 50px;
      height: 50px;
      background: url('assets/correct.mp3') no-repeat center center;
      background-size: contain;
    }
    #feedback {
      font-size: 2em;
      margin-top: 20px;
    }
    #resultScreen {
      display: flex;
      flex-direction: column;
    }
    #playAgain {
      padding: 15px 30px;
      font-size: 1.5em;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      margin-top: 20px;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: #FFD700;
      opacity: 0.7;
      animation: fall 3s linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(360deg); }
    }
    #instructionBox {
      background-color: #a3d5d3;
      padding: 10px 20px;
      border-radius: 15px;
      font-size: 1.2em;
      text-align: center;
      margin-bottom: 20px;
      max-width: 90%;
    }
  </style>
</head>
<body>

  <!-- Logo Screen -->
  <div id="logoScreen">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
  </div>

  <!-- Game Screen -->
  <div id="gameScreen">
    <div id="instructionBox">Tap on the <span id="instructionType">big</span> object.</div>
    <div class="question-container" id="questionContainer"></div>
    <div id="feedback"></div>
  </div>

  <!-- Result Screen -->
  <div id="resultScreen">
    <div id="finalMessage" style="font-size:3em; margin-top:50px;">🎉 Good Job! 🎉</div>
    <button id="playAgain">Play Again</button>
  </div>

  <!-- Audio -->
  <audio id="audioCorrect" src="assets/correct.mp3"></audio>
  <audio id="audioWrong" src="assets/wrong.mp3"></audio>
  <audio id="audioClap" src="assets/freesound_community-claps-44774.mp3"></audio>

  <script>
    const logoScreen = document.getElementById('logoScreen');
    const gameScreen = document.getElementById('gameScreen');
    const resultScreen = document.getElementById('resultScreen');
    const questionContainer = document.getElementById('questionContainer');
    const feedback = document.getElementById('feedback');
    const instructionTypeSpan = document.getElementById('instructionType');

    const audioCorrect = document.getElementById('audioCorrect');
    const audioWrong = document.getElementById('audioWrong');
    const audioClap = document.getElementById('audioClap');

    const playAgainBtn = document.getElementById('playAgain');

    const questions = [
      { imgs: ['assets/elephant&butterfly.png'], answer: 'elephant', type: 'big' },
      { imgs: ['assets/giraffe&turtle.png'], answer: 'turtle', type: 'small' },
      { imgs: ['assets/bluedaino&purple-daino.png'], answer: 'blue-daino', type: 'big' },
      { imgs: ['assets/colourball&whiteball.png'], answer: 'whiteball', type: 'small' },
      { imgs: ['assets/watermellon&apple.png'], answer: 'watermellon', type: 'big' },
      { imgs: ['assets/truck&car.png'], answer: 'car', type: 'small' },
    ];

    let currentQ = 0;
    let wrongAttempts = 0;

    function showLogo() {
      logoScreen.style.display = 'flex';
      setTimeout(() => {
        logoScreen.style.display = 'none';
        gameScreen.style.display = 'flex';
        showQuestion();
      }, 2000);
    }

    function showQuestion() {
      questionContainer.innerHTML = '';
      feedback.textContent = '';
      wrongAttempts = 0;

      const q = questions[currentQ];
      instructionTypeSpan.textContent = q.type;

      q.imgs.forEach(src => {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'option';
        const img = document.createElement('img');
        img.src = src;
        img.alt = 'option';
        optionDiv.appendChild(img);
        optionDiv.addEventListener('click', () => handleClick(q, optionDiv));
        questionContainer.appendChild(optionDiv);
      });
    }

    function handleClick(q, optionDiv) {
      const selectedName = optionDiv.querySelector('img').src.split('/').pop().split('&')[0];
      if(selectedName.toLowerCase() === q.answer.toLowerCase()) {
        audioCorrect.play();
        addGlow(optionDiv);
        feedback.textContent = '✔ Good Job!';
        setTimeout(nextQuestion, 1000);
      } else {
        audioWrong.play();
        wrongAttempts++;
        optionDiv.style.transform = 'translateX(10px)';
        setTimeout(()=> optionDiv.style.transform = 'translateX(0)', 200);
        if(wrongAttempts >= 2) {
          // Highlight correct option
          const correctDiv = Array.from(document.querySelectorAll('.option')).find(div => {
            const name = div.querySelector('img').src.split('/').pop().split('&')[0];
            return name.toLowerCase() === q.answer.toLowerCase();
          });
          addGlow(correctDiv);
        }
      }
    }

    function addGlow(optionDiv) {
      const glow = document.createElement('div');
      glow.className = 'glow-ring';
      optionDiv.appendChild(glow);
    }

    function nextQuestion() {
      currentQ++;
      if(currentQ >= questions.length) {
        showResult();
      } else {
        showQuestion();
      }
    }

    function showResult() {
      gameScreen.style.display = 'none';
      resultScreen.style.display = 'flex';
      audioClap.play();
      launchConfetti();
    }

    playAgainBtn.addEventListener('click', () => {
      resultScreen.style.display = 'none';
      currentQ = 0;
      showLogo();
    });

    function launchConfetti() {
      for(let i=0;i<100;i++){
        const confetti = document.createElement('div');
        confetti.className='confetti-piece';
        confetti.style.left = Math.random()*window.innerWidth + 'px';
        confetti.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
        document.body.appendChild(confetti);
        setTimeout(()=> confetti.remove(), 3000);
      }
    }

    showLogo();
  </script>
</body>
</html>
