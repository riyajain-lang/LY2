<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >
  <meta name="theme-color" content="#7ddff4">
  <title>Size Seriation</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: #7ddff4;
      color: #3f285f;
    }

    button {
      font: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* ==================================================
       2-SECOND LOGO SCREEN
    ================================================== */

    #splashScreen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    #splashLogo {
      width: 260px;
      max-width: 58vw;
      max-height: 38vh;
      object-fit: contain;
    }

    /* ==================================================
       PLAYFUL GAME BACKGROUND
    ================================================== */

    #gameScreen {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      padding:
        max(8px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(8px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 8% 14%, rgba(255,255,255,.95) 0 3.2%, transparent 3.4%),
        radial-gradient(circle at 91% 15%, rgba(255,255,255,.9) 0 2.7%, transparent 2.9%),
        linear-gradient(145deg, #79ddf1 0 25%, #a7ecce 25% 48%, #ffe58a 48% 70%, #ffb6c8 70% 100%);
    }

    #gameScreen::before {
      content: "";
      position: absolute;
      left: -7%;
      right: -7%;
      bottom: -17%;
      height: 48%;
      border-radius: 50% 50% 0 0;
      background:
        radial-gradient(circle at 14% 25%, rgba(255,255,255,.22) 0 2.5%, transparent 2.7%),
        radial-gradient(circle at 78% 22%, rgba(255,255,255,.2) 0 2.2%, transparent 2.4%),
        linear-gradient(90deg, #8fd75e, #5fca75, #72d9a4);
      z-index: 0;
    }

    .decor {
      position: absolute;
      z-index: 0;
      pointer-events: none;
    }

    .cloud {
      width: 88px;
      height: 31px;
      top: 12%;
      left: 4%;
      border-radius: 30px;
      background: rgba(255,255,255,.92);
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .cloud::before {
      width: 36px;
      height: 36px;
      left: 14px;
      top: -17px;
    }

    .cloud::after {
      width: 45px;
      height: 45px;
      right: 8px;
      top: -24px;
    }

    .rainbow {
      right: 3.5%;
      top: 8.5%;
      width: 110px;
      height: 58px;
      border-radius: 110px 110px 0 0;
      border: 12px solid #ff6b8a;
      border-bottom: 0;
      box-shadow:
        inset 0 0 0 10px #ffd84f,
        inset 0 0 0 20px #5ed4a3,
        inset 0 0 0 30px #6ea8ff;
      opacity: .9;
    }

    .starDecor {
      width: 28px;
      height: 28px;
      background: #fff16a;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 56%, 79% 93%, 50% 71%, 21% 93%, 32% 56%, 2% 35%, 39% 35%);
      filter: drop-shadow(0 3px 0 rgba(92,63,143,.25));
    }

    .starOne {
      left: 11%;
      top: 23%;
      transform: rotate(-12deg);
    }

    .starTwo {
      right: 12%;
      top: 26%;
      transform: rotate(15deg) scale(.8);
      background: #ff85b4;
    }

    .dotDecor {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #7452c7;
      box-shadow:
        42px 18px 0 #ff7c78,
        85px -9px 0 #49c9b0,
        122px 17px 0 #ffd348;
      opacity: .72;
    }

    .dotsLeft {
      left: 3%;
      bottom: 10%;
    }

    /* ==================================================
       HEADER
    ================================================== */

    .topBar,
    .gameCard {
      position: relative;
      z-index: 2;
    }

    .topBar {
      width: 1000px;
      max-width: 98%;
      min-height: 12%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }

    .titleWrap {
      grid-column: 2;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 48px;
      font-size: clamp(29px, 4.5vw, 50px);
      line-height: 1;
      color: #633b8f;
      text-shadow: 0 3px 0 rgba(255,255,255,.8);
    }

    .subtitle {
      margin-top: 4px;
      font-size: 19px;
      font-size: clamp(14px, 1.9vw, 20px);
      font-weight: 900;
      color: #176f69;
    }

    .progressBox {
      justify-self: end;
      min-width: 104px;
      padding: 7px 12px;
      border: 3px solid #623a8c;
      border-radius: 19px;
      background: #ffffff;
      text-align: center;
      font-size: 18px;
      font-size: clamp(14px, 1.8vw, 19px);
      font-weight: 1000;
      box-shadow: 0 5px 0 rgba(83,49,121,.22);
    }

    /* ==================================================
       MAIN CARD
    ================================================== */

    .gameCard {
      width: 1050px;
      max-width: 97%;
      flex: 1;
      min-height: 0;
      max-height: 85%;
      margin-bottom: 1%;
      padding: 11px 22px 17px;
      border: 5px solid #623a8c;
      border-radius: 34px;
      background: rgba(255,255,255,.96);
      box-shadow:
        0 10px 0 rgba(87,52,127,.22),
        0 18px 34px rgba(66,46,89,.18);
      display: grid;
      grid-template-rows: auto minmax(155px, 1fr) auto minmax(155px, 1.05fr);
      gap: 9px;
      align-items: center;
    }

    #instruction {
      margin: 0;
      text-align: center;
      font-size: 31px;
      font-size: clamp(20px, 3vw, 32px);
      line-height: 1.1;
      font-weight: 1000;
      color: #4f2f78;
    }

    /* ==================================================
       THREE OBJECTS
    ================================================== */

    .objectArea {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: stretch;
      justify-content: center;
      gap: clamp(9px, 2vw, 20px);
    }

    .objectCard {
      position: relative;
      min-width: 0;
      min-height: 125px;
      padding: 8px;
      border: 4px solid #ff7d78;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 7px 0 #ffc0b3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .15s ease, border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .objectCard:nth-child(2) {
      border-color: #f3b83c;
      box-shadow: 0 7px 0 #ffe09c;
    }

    .objectCard:nth-child(3) {
      border-color: #46c7a7;
      box-shadow: 0 7px 0 #a8ebd9;
    }

    .objectCard::before {
      content: "";
      position: absolute;
      inset: 7px;
      border: 2px dashed #d9c5ef;
      border-radius: 16px;
      pointer-events: none;
    }

    .objectCard img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      max-height: 145px;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
    }

    .objectCard.selected {
      transform: translateY(-5px) scale(1.025);
      border-color: #7449bf;
      background: #f8f3ff;
      box-shadow:
        0 0 0 7px rgba(116,73,191,.14),
        0 8px 0 #9d7dd3;
    }

    .objectCard.sorted {
      border-color: #2fb66d;
      background: #effff6;
      box-shadow: 0 7px 0 #70d9a0;
      cursor: default;
    }

    .objectCard.sorted img {
      opacity: .38;
    }

    .objectCard.wiggle {
      animation: giggle .42s ease;
    }

    .sortedBadge {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 4px solid #ffffff;
      border-radius: 50%;
      background: #31b86b;
      color: #ffffff;
      font-size: 34px;
      font-weight: 1000;
      box-shadow: 0 5px 12px rgba(0,0,0,.18);
      animation: tickPop .42s ease;
    }

    .promptText {
      text-align: center;
      font-size: 21px;
      font-size: clamp(16px, 2.2vw, 23px);
      font-weight: 900;
      color: #5e3a84;
    }

    /* ==================================================
       THREE BINS - POSITION SHUFFLES EACH ROUND
    ================================================== */

    #options {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(10px, 2vw, 19px);
      align-items: stretch;
    }

    .binOption {
      position: relative;
      min-width: 0;
      min-height: 138px;
      padding: 8px;
      border: 5px solid #633b8f;
      border-radius: 27px;
      background: #ffffff;
      box-shadow: 0 8px 0 #9b78c5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .12s ease, box-shadow .12s ease, background .2s ease;
      overflow: hidden;
    }

    .binOption::before {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      top: 7px;
      height: 8px;
      border-radius: 8px;
      background: #ff7d78;
    }

    .binOption[data-size="medium"]::before {
      background: #ffd25a;
    }

    .binOption[data-size="small"]::before {
      background: #52cdb0;
    }

    .binOption img {
      width: 100%;
      height: 100%;
      max-height: 135px;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
    }

    .binOption:active {
      transform: translateY(5px) scale(.985);
      box-shadow: 0 3px 0 #9b78c5;
    }

    .binOption:disabled {
      cursor: default;
    }

    .binOption.wrong {
      border-color: #d8494e;
      background: #fff5f5;
      animation: giggle .42s ease;
    }

    .binOption.correctFlash {
      border-color: #2fac68;
      background: #effff6;
      box-shadow: 0 8px 0 #69cd95;
    }

    .binOption.hintGlow {
      border-color: #f0a400;
      background: #fffdf1;
      animation: answerGlow .8s ease-in-out infinite alternate;
    }

    .binTick {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border: 4px solid #ffffff;
      border-radius: 50%;
      background: #31b86b;
      color: #ffffff;
      font-size: 29px;
      font-weight: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,.18);
      animation: tickPop .42s ease;
    }

    /* ==================================================
       FEEDBACK
    ================================================== */

    #feedback {
      position: fixed;
      z-index: 50;
      left: 50%;
      top: 49%;
      transform: translate(-50%, -50%) scale(.6);
      opacity: 0;
      pointer-events: none;
      min-width: 300px;
      max-width: 84vw;
      padding: 15px 24px;
      border: 5px solid #2e9c61;
      border-radius: 27px;
      background: rgba(242,255,247,.98);
      color: #257f4e;
      text-align: center;
      font-size: 48px;
      font-size: clamp(31px, 6vw, 54px);
      font-weight: 1000;
      box-shadow: 0 12px 30px rgba(0,0,0,.24);
    }

    #feedback.show {
      animation: feedbackPop 1s ease forwards;
    }

    /* ==================================================
       FINAL SCREEN
    ================================================== */

    #endScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 15%, rgba(255,255,255,.8) 0 3%, transparent 3.2%),
        linear-gradient(145deg, #6fdcf1 0 25%, #a6ecc7 25% 50%, #ffe585 50% 73%, #ffafc8 73% 100%);
    }

    .endCard {
      position: relative;
      z-index: 3;
      width: 730px;
      max-width: 94vw;
      max-height: 92vh;
      padding: 22px 26px 25px;
      border: 6px solid #623a8c;
      border-radius: 35px;
      background: rgba(255,255,255,.97);
      text-align: center;
      box-shadow:
        0 12px 0 rgba(84,49,121,.24),
        0 20px 42px rgba(0,0,0,.18);
    }

    .endCard h2 {
      margin: 0 0 7px;
      color: #2b9b60;
      font-size: 66px;
      font-size: clamp(43px, 8vw, 74px);
      line-height: 1;
    }

    .endCard p {
      margin: 5px 0 16px;
      color: #5c397e;
      font-size: 25px;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 900;
    }

    .endAnimals {
      height: 190px;
      max-height: 28vh;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
    }

    .endAnimalCard {
      width: 29%;
      height: 100%;
      padding: 8px;
      border: 4px solid #ff7d78;
      border-radius: 23px;
      background: #ffffff;
      box-shadow: 0 7px 0 #ffc0b3;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: endBounce 1s ease-in-out infinite alternate;
    }

    .endAnimalCard:nth-child(2) {
      border-color: #f3b83c;
      box-shadow: 0 7px 0 #ffe09c;
      animation-delay: .15s;
    }

    .endAnimalCard:nth-child(3) {
      border-color: #46c7a7;
      box-shadow: 0 7px 0 #a8ebd9;
      animation-delay: .3s;
    }

    .endAnimalCard img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #playAgainBtn {
      margin-top: 13px;
      min-width: 205px;
      padding: 13px 28px;
      border: 4px solid #5a347f;
      border-radius: 23px;
      background: linear-gradient(#fff06b, #ffc63f);
      color: #57316f;
      font-size: 28px;
      font-size: clamp(22px, 3.7vw, 31px);
      font-weight: 1000;
      box-shadow: 0 7px 0 #d88a2a;
      cursor: pointer;
      touch-action: manipulation;
    }

    #playAgainBtn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #d88a2a;
    }

    #confettiCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ==================================================
       ANIMATIONS
    ================================================== */

    @keyframes giggle {
      0%, 100% { transform: translateX(0) rotate(0); }
      20% { transform: translateX(-8px) rotate(-3deg); }
      40% { transform: translateX(8px) rotate(3deg); }
      60% { transform: translateX(-6px) rotate(-2deg); }
      80% { transform: translateX(6px) rotate(2deg); }
    }

    @keyframes answerGlow {
      from {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255,184,0,.35), 0 8px 0 #d8a02a;
      }
      to {
        transform: scale(1.035);
        box-shadow: 0 0 0 12px rgba(255,184,0,.13), 0 8px 0 #d8a02a;
      }
    }

    @keyframes tickPop {
      0% { transform: scale(.3) rotate(-20deg); opacity: 0; }
      75% { transform: scale(1.12) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes feedbackPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(.55);
      }
      20%, 78% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.12);
      }
    }

    @keyframes endBounce {
      from { transform: translateY(0); }
      to { transform: translateY(-8px); }
    }

    /* ==================================================
       SHORT LANDSCAPE SCREENS
    ================================================== */

    @media (max-height: 640px) {
      .topBar {
        min-height: 11%;
      }

      .gameCard {
        max-height: 87%;
        padding: 7px 16px 10px;
        grid-template-rows: auto minmax(105px, 1fr) auto minmax(100px, .95fr);
        gap: 5px;
      }

      .objectCard {
        min-height: 95px;
        padding: 6px;
      }

      .objectCard img {
        max-height: 96px;
      }

      .binOption {
        min-height: 90px;
        padding: 5px;
      }

      .binOption img {
        max-height: 92px;
      }

      .subtitle {
        display: none;
      }
    }

    /* ==================================================
       MOBILE PORTRAIT
    ================================================== */

    @media (max-width: 620px) and (orientation: portrait) {
      .topBar {
        width: 100%;
        grid-template-columns: 1fr auto;
        min-height: 11%;
      }

      .titleWrap {
        grid-column: 1;
        text-align: left;
        padding-left: 4px;
      }

      .progressBox {
        grid-column: 2;
        min-width: 88px;
      }

      h1 {
        font-size: clamp(27px, 8vw, 36px);
      }

      .gameCard {
        width: 98%;
        max-height: 87%;
        padding: 9px 9px 12px;
        grid-template-rows: auto minmax(150px, .9fr) auto minmax(250px, 1.35fr);
      }

      .objectArea {
        gap: 6px;
      }

      .objectCard {
        min-height: 115px;
        padding: 5px;
        border-radius: 17px;
      }

      .objectCard::before {
        inset: 5px;
        border-radius: 12px;
      }

      .objectCard img {
        max-height: 125px;
      }

      #options {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .binOption {
        min-height: 70px;
        padding: 4px 10px;
      }

      .binOption img {
        max-height: 72px;
      }

      .binOption::before {
        left: 7px;
        right: 7px;
        top: 5px;
        height: 6px;
      }

      .rainbow {
        transform: scale(.72);
        transform-origin: top right;
      }

      .starDecor {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- ==================================================
       WHITE LOGO SCREEN
  ================================================== -->

  <div id="splashScreen" aria-label="Logo screen">
    <img
      id="splashLogo"
      src="assets/innovine-logo.png"
      alt="Innovine logo"
    >
  </div>

  <!-- ==================================================
       GAME SCREEN
  ================================================== -->

  <main id="gameScreen" aria-live="polite">

    <div class="decor cloud"></div>
    <div class="decor rainbow"></div>
    <div class="decor starDecor starOne"></div>
    <div class="decor starDecor starTwo"></div>
    <div class="decor dotDecor dotsLeft"></div>

    <header class="topBar">

      <div class="titleWrap">
        <h1>Size Seriation</h1>
        <div class="subtitle">Sort the three animals into the correct bins.</div>
      </div>

      <div class="progressBox">
        Round
        <span id="roundNumber">1</span>
        /
        <span id="totalRounds">3</span>
      </div>

    </header>

    <section class="gameCard">

      <p id="instruction">Place Me Into The Correct Bin!</p>

      <div id="objectArea" class="objectArea" aria-label="Animals to sort"></div>

      <div id="promptText" class="promptText">
        Tap an animal, then tap its correct bin.
      </div>

      <div id="options" aria-label="Size bins"></div>

    </section>

  </main>

  <!-- ==================================================
       CORRECT FEEDBACK
  ================================================== -->

  <div id="feedback" role="status">✅ Good Job!</div>

  <!-- ==================================================
       FINAL SCREEN
  ================================================== -->

  <section id="endScreen" aria-label="Game complete">

    <canvas id="confettiCanvas"></canvas>

    <div class="endCard">

      <h2>Good Job!</h2>

      <p>You sorted all the animals by size!</p>

      <div class="endAnimals" aria-hidden="true">

        <div class="endAnimalCard">
          <img src="assets/big-elephant.png" alt="">
        </div>

        <div class="endAnimalCard">
          <img src="assets/medium-panda.png" alt="">
        </div>

        <div class="endAnimalCard">
          <img src="assets/small-rabbit.png" alt="">
        </div>

      </div>

      <button id="playAgainBtn" type="button">
        ▶ Play Again
      </button>

    </div>

  </section>

  <!-- ==================================================
       AUDIO
  ================================================== -->

  <audio
    id="clapsSound"
    src="assets/claps.mp3"
    preload="auto"
    playsinline
  ></audio>

  <audio
    id="wrongSound"
    src="assets/wrong.mp3"
    preload="auto"
    playsinline
  ></audio>

  <!-- ==================================================
       JAVASCRIPT
  ================================================== -->

  <script>
    (function () {

      "use strict";

      /* ==================================================
         SETTINGS
      ================================================== */

      var NEXT_ROUND_DELAY = 1100;

      /* ==================================================
         THREE ROUNDS

         Each round contains:
         - 1 big animal
         - 1 medium animal
         - 1 small animal
      ================================================== */

      var ROUND_BANK = [

        [
          {
            id: "big-elephant",
            image: "assets/big-elephant.png",
            alt: "Big elephant",
            size: "big"
          },
          {
            id: "medium-monkey",
            image: "assets/medium-monkey.png",
            alt: "Medium monkey",
            size: "medium"
          },
          {
            id: "small-frog",
            image: "assets/small-frog.png",
            alt: "Small frog",
            size: "small"
          }
        ],

        [
          {
            id: "big-giraffe",
            image: "assets/big-giraffe.png",
            alt: "Big giraffe",
            size: "big"
          },
          {
            id: "medium-panda",
            image: "assets/medium-panda.png",
            alt: "Medium panda",
            size: "medium"
          },
          {
            id: "small-rabbit",
            image: "assets/small-rabbit.png",
            alt: "Small rabbit",
            size: "small"
          }
        ],

        [
          {
            id: "big-whale",
            image: "assets/big-whale.png",
            alt: "Big whale",
            size: "big"
          },
          {
            id: "medium-penguin",
            image: "assets/medium-penguin.png",
            alt: "Medium penguin",
            size: "medium"
          },
          {
            id: "small-rat",
            image: "assets/small-rat.png",
            alt: "Small rat",
            size: "small"
          }
        ]

      ];

      /* ==================================================
         BIN DATA
      ================================================== */

      var BIN_DATA = [

        {
          size: "big",
          image: "assets/big-bin.png",
          alt: "Big bin"
        },

        {
          size: "medium",
          image: "assets/medium-bin.png",
          alt: "Medium bin"
        },

        {
          size: "small",
          image: "assets/small-bin.png",
          alt: "Small bin"
        }

      ];

      /* ==================================================
         ELEMENTS
      ================================================== */

      var splashScreen = document.getElementById("splashScreen");
      var gameScreen = document.getElementById("gameScreen");
      var endScreen = document.getElementById("endScreen");
      var objectArea = document.getElementById("objectArea");
      var optionsBox = document.getElementById("options");
      var promptText = document.getElementById("promptText");
      var roundNumber = document.getElementById("roundNumber");
      var totalRounds = document.getElementById("totalRounds");
      var feedback = document.getElementById("feedback");
      var playAgainBtn = document.getElementById("playAgainBtn");
      var clapsSound = document.getElementById("clapsSound");
      var wrongSound = document.getElementById("wrongSound");

      /* ==================================================
         GAME STATE
      ================================================== */

      var currentRounds = [];
      var currentRoundIndex = 0;
      var currentItems = [];
      var selectedItemId = null;
      var sortedCount = 0;
      var attemptsByItem = {};
      var nextTimer = null;

      /* ==================================================
         SHUFFLE
      ================================================== */

      function shuffle(array) {

        var copy = array.slice();
        var i;
        var j;
        var temp;

        for (i = copy.length - 1; i > 0; i--) {

          j = Math.floor(Math.random() * (i + 1));

          temp = copy[i];
          copy[i] = copy[j];
          copy[j] = temp;

        }

        return copy;

      }

      /* ==================================================
         SAFE AUDIO
      ================================================== */

      function safePlay(audioElement) {

        try {

          audioElement.pause();
          audioElement.currentTime = 0;

          var playPromise = audioElement.play();

          if (
            playPromise &&
            typeof playPromise.catch === "function"
          ) {

            playPromise.catch(function () {});

          }

        }
        catch (error) {}

      }

      /* ==================================================
         FIND CURRENT ITEM
      ================================================== */

      function getItemById(itemId) {

        var i;

        for (i = 0; i < currentItems.length; i++) {

          if (currentItems[i].id === itemId) {
            return currentItems[i];
          }

        }

        return null;

      }

      /* ==================================================
         CLEAR ALL HINT GLOWS
      ================================================== */

      function clearHintGlows() {

        var bins = optionsBox.getElementsByClassName("binOption");
        var i;

        for (i = 0; i < bins.length; i++) {

          bins[i].className =
            bins[i].className.replace(/\s?hintGlow/g, "");

        }

      }

      /* ==================================================
         BUILD THREE ANIMAL CARDS
      ================================================== */

      function buildObjects(items) {

        objectArea.innerHTML = "";

        items.forEach(function (item) {

          var card = document.createElement("button");
          var image = document.createElement("img");

          card.type = "button";
          card.className = "objectCard";
          card.setAttribute("data-item-id", item.id);
          card.setAttribute("aria-label", "Select " + item.alt);

          image.src = item.image;
          image.alt = item.alt;
          image.draggable = false;

          card.appendChild(image);

          card.onclick = function () {
            selectObject(item.id);
          };

          objectArea.appendChild(card);

        });

      }

      /* ==================================================
         BUILD BINS IN A NEW RANDOM ORDER
      ================================================== */

      function buildBins() {

        var shuffledBins = shuffle(BIN_DATA);

        optionsBox.innerHTML = "";

        shuffledBins.forEach(function (bin) {

          var button = document.createElement("button");
          var image = document.createElement("img");

          button.type = "button";
          button.className = "binOption";
          button.setAttribute("data-size", bin.size);
          button.setAttribute("aria-label", bin.alt);

          image.src = bin.image;
          image.alt = bin.alt;
          image.draggable = false;

          button.appendChild(image);

          button.onclick = function () {
            checkBin(button, bin.size);
          };

          optionsBox.appendChild(button);

        });

      }

      /* ==================================================
         SELECT ONE ANIMAL
      ================================================== */

      function selectObject(itemId) {

        var cards = objectArea.getElementsByClassName("objectCard");
        var i;
        var cardItemId;

        for (i = 0; i < cards.length; i++) {

          cardItemId = cards[i].getAttribute("data-item-id");

          if (
            cardItemId === itemId &&
            cards[i].className.indexOf("sorted") !== -1
          ) {
            return;
          }

        }

        selectedItemId = itemId;

        clearHintGlows();

        for (i = 0; i < cards.length; i++) {

          cardItemId = cards[i].getAttribute("data-item-id");

          cards[i].className =
            cards[i].className.replace(/\s?selected/g, "");

          if (
            cardItemId === itemId &&
            cards[i].className.indexOf("sorted") === -1
          ) {

            cards[i].className += " selected";

          }

        }

        promptText.textContent = "Now tap the correct bin.";

        if (attemptsByItem[itemId] >= 2) {

          var item = getItemById(itemId);

          if (item) {
            glowCorrectBin(item.size);
          }

        }

      }

      /* ==================================================
         GLOW CORRECT BIN
      ================================================== */

      function glowCorrectBin(correctSize) {

        var bins = optionsBox.getElementsByClassName("binOption");
        var i;

        clearHintGlows();

        for (i = 0; i < bins.length; i++) {

          if (
            bins[i].getAttribute("data-size") === correctSize
          ) {

            bins[i].className += " hintGlow";

          }

        }

      }

      /* ==================================================
         SHOW GOOD JOB
      ================================================== */

      function showGoodJob(message) {

        feedback.textContent = message || "✅ Good Job!";
        feedback.className = "";

        void feedback.offsetWidth;

        feedback.className = "show";

      }

      /* ==================================================
         SHOW WRONG BIN GIGGLE
      ================================================== */

      function showWrongBin(button) {

        button.className =
          button.className.replace(/\s?wrong/g, "") +
          " wrong";

        window.setTimeout(function () {

          button.className =
            button.className.replace(/\s?wrong/g, "");

        }, 450);

      }

      /* ==================================================
         SHOW CORRECT BIN TICK
      ================================================== */

      function flashCorrectBin(button) {

        var tick = document.createElement("div");

        button.className =
          button.className.replace(/\s?hintGlow/g, "") +
          " correctFlash";

        tick.className = "binTick";
        tick.textContent = "✓";

        button.appendChild(tick);

        window.setTimeout(function () {

          button.className =
            button.className.replace(/\s?correctFlash/g, "");

          if (tick.parentNode === button) {
            button.removeChild(tick);
          }

        }, 850);

      }

      /* ==================================================
         MARK ANIMAL AS SORTED
      ================================================== */

      function markObjectSorted(itemId) {

        var cards = objectArea.getElementsByClassName("objectCard");
        var i;

        for (i = 0; i < cards.length; i++) {

          if (
            cards[i].getAttribute("data-item-id") === itemId
          ) {

            var badge = document.createElement("div");

            cards[i].className = "objectCard sorted";
            cards[i].disabled = true;

            badge.className = "sortedBadge";
            badge.textContent = "✓";

            cards[i].appendChild(badge);

          }

        }

      }

      /* ==================================================
         GENTLE REMINDER TO SELECT AN ANIMAL
      ================================================== */

      function remindToSelect() {

        var cards = objectArea.getElementsByClassName("objectCard");
        var i;

        promptText.textContent = "First, tap an animal.";

        for (i = 0; i < cards.length; i++) {

          if (cards[i].className.indexOf("sorted") === -1) {

            cards[i].className += " wiggle";

          }

        }

        window.setTimeout(function () {

          for (i = 0; i < cards.length; i++) {

            cards[i].className =
              cards[i].className.replace(/\s?wiggle/g, "");

          }

        }, 450);

      }

      /* ==================================================
         CHECK BIN
      ================================================== */

      function checkBin(button, selectedSize) {

        var selectedItem;

        if (!selectedItemId) {

          remindToSelect();
          return;

        }

        selectedItem = getItemById(selectedItemId);

        if (!selectedItem) {
          return;
        }

        /* CORRECT */

        if (selectedSize === selectedItem.size) {

          clearHintGlows();
          flashCorrectBin(button);
          markObjectSorted(selectedItem.id);

          sortedCount++;
          selectedItemId = null;

          safePlay(clapsSound);
          showGoodJob("✅ Good Job!");

          if (sortedCount < 3) {

            promptText.textContent =
              "Great! Tap another animal.";

          }
          else {

            promptText.textContent =
              "Wonderful sorting!";

            nextTimer = window.setTimeout(function () {

              currentRoundIndex++;

              if (currentRoundIndex < currentRounds.length) {

                showRound();

              }
              else {

                showEndScreen();

              }

            }, NEXT_ROUND_DELAY);

          }

        }

        /* WRONG */

        else {

          attemptsByItem[selectedItem.id]++;

          safePlay(wrongSound);
          showWrongBin(button);

          promptText.textContent = "Try another bin.";

          if (attemptsByItem[selectedItem.id] >= 2) {

            glowCorrectBin(selectedItem.size);

          }

        }

      }

      /* ==================================================
         SHOW ROUND
      ================================================== */

      function showRound() {

        currentItems = shuffle(currentRounds[currentRoundIndex]);
        selectedItemId = null;
        sortedCount = 0;
        attemptsByItem = {};

        currentItems.forEach(function (item) {
          attemptsByItem[item.id] = 0;
        });

        roundNumber.textContent = currentRoundIndex + 1;

        buildObjects(currentItems);
        buildBins();

        promptText.textContent =
          "Tap an animal, then tap its correct bin.";

      }

      /* ==================================================
         START GAME
      ================================================== */

      function startGame() {

        if (nextTimer) {

          window.clearTimeout(nextTimer);
          nextTimer = null;

        }

        stopConfetti();

        endScreen.style.display = "none";
        gameScreen.style.display = "flex";

        currentRounds = shuffle(ROUND_BANK);
        currentRoundIndex = 0;

        totalRounds.textContent = currentRounds.length;

        showRound();

      }

      /* ==================================================
         END SCREEN
      ================================================== */

      function showEndScreen() {

        gameScreen.style.display = "none";
        endScreen.style.display = "flex";

        safePlay(clapsSound);
        startConfetti();

      }

      /* ==================================================
         PLAY AGAIN
      ================================================== */

      playAgainBtn.onclick = function () {
        startGame();
      };

      /* ==================================================
         CONFETTI
      ================================================== */

      var canvas = document.getElementById("confettiCanvas");
      var ctx = canvas.getContext("2d");
      var confettiPieces = [];
      var confettiFrame = null;
      var confettiRunning = false;

      var confettiColors = [
        "#ffcf2f",
        "#ff6b7a",
        "#45cfb0",
        "#7657e8",
        "#ff8fc4",
        "#59c75b",
        "#58b7ff"
      ];

      function resizeCanvas() {

        var ratio = window.devicePixelRatio || 1;

        canvas.width = Math.floor(window.innerWidth * ratio);
        canvas.height = Math.floor(window.innerHeight * ratio);

        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";

        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      }

      function makeConfettiPiece() {

        return {

          x: Math.random() * window.innerWidth,
          y: -20 - Math.random() * window.innerHeight,
          w: 6 + Math.random() * 7,
          h: 8 + Math.random() * 10,
          speed: 2.1 + Math.random() * 3.3,
          drift: -1.25 + Math.random() * 2.5,
          rotation: Math.random() * Math.PI,
          spin: -.12 + Math.random() * .24,
          color: confettiColors[
            Math.floor(Math.random() * confettiColors.length)
          ]

        };

      }

      function drawConfetti() {

        var i;
        var piece;

        if (!confettiRunning) {
          return;
        }

        ctx.clearRect(
          0,
          0,
          window.innerWidth,
          window.innerHeight
        );

        for (i = 0; i < confettiPieces.length; i++) {

          piece = confettiPieces[i];

          piece.y += piece.speed;
          piece.x += piece.drift;
          piece.rotation += piece.spin;

          if (piece.y > window.innerHeight + 25) {

            confettiPieces[i] = makeConfettiPiece();
            confettiPieces[i].y = -20;
            piece = confettiPieces[i];

          }

          ctx.save();

          ctx.translate(piece.x, piece.y);
          ctx.rotate(piece.rotation);
          ctx.fillStyle = piece.color;

          ctx.fillRect(
            -piece.w / 2,
            -piece.h / 2,
            piece.w,
            piece.h
          );

          ctx.restore();

        }

        confettiFrame =
          window.requestAnimationFrame(drawConfetti);

      }

      function startConfetti() {

        var i;

        resizeCanvas();
        confettiPieces = [];

        for (i = 0; i < 100; i++) {

          confettiPieces.push(
            makeConfettiPiece()
          );

        }

        confettiRunning = true;
        drawConfetti();

      }

      function stopConfetti() {

        confettiRunning = false;

        if (confettiFrame) {

          window.cancelAnimationFrame(confettiFrame);
          confettiFrame = null;

        }

        ctx.clearRect(
          0,
          0,
          canvas.width,
          canvas.height
        );

      }

      window.addEventListener(
        "resize",
        function () {

          if (confettiRunning) {
            resizeCanvas();
          }

        }
      );

      /* ==================================================
         START AFTER 2-SECOND LOGO
      ================================================== */

      window.setTimeout(function () {

        splashScreen.style.display = "none";
        startGame();

      }, 2000);

    })();
  </script>

</body>
</html>
