<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Colours Game</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', sans-serif;
        background: #f0f8ff;
        overflow: hidden;
    }
    #splash, #instructions, #game, #end {
        width: 100%;
        height: 100vh;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        position: relative;
    }
    #splash img {
        width: 200px;
        height: auto;
    }
    #instructions h2 {
        color: #ff6347;
        font-size: 2rem;
        text-align: center;
    }
    #instructions button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1.5rem;
        background: #ffeb3b;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
    #game {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
    }
    #objects {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 50px;
    }
    .object {
        width: 100px;
        height: 100px;
        background-size: cover;
        cursor: grab;
    }
    #buckets {
        display: flex;
        justify-content: space-around;
        margin-bottom: 30px;
    }
    .bucket {
        width: 150px;
        height: 150px;
        border-radius: 10px;
        border: 4px dashed #555;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: bold;
        color: #fff;
        position: relative;
    }
    .bucket.red { background-color: #ff4d4d; }
    .bucket.yellow { background-color: #ffeb3b; color: #000; }
    .bucket.blue { background-color: #4d79ff; }
    #end h1 {
        color: #32cd32;
        font-size: 3rem;
    }
    #end button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1.5rem;
        background: #ffeb3b;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash" style="display:flex;">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Instructions -->
<div id="instructions">
    <h2>Drag each object into the correct colour bucket!</h2>
    <button onclick="startGame()">Start</button>
</div>

<!-- Game Screen -->
<div id="game">
    <div id="objects"></div>
    <div id="buckets">
        <div class="bucket red" data-color="red">Red</div>
        <div class="bucket yellow" data-color="yellow">Yellow</div>
        <div class="bucket blue" data-color="blue">Blue</div>
    </div>
</div>

<!-- End Screen -->
<div id="end">
    <h1>Well done!</h1>
    <button onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const objectsData = [
    {name: 'red1', color: 'red', image: 'assets/a06dac24-6c50-487f-a9fb-ddd3f709234e.png'},
    {name: 'yellow1', color: 'yellow', image: 'assets/a06dac24-6c50-487f-a9fb-ddd3f709234e.png'},
    {name: 'blue1', color: 'blue', image: 'assets/a06dac24-6c50-487f-a9fb-ddd3f709234e.png'}
];

let currentIndex = 0;
let attempts = 0;

function showSplash() {
    document.getElementById('splash').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('instructions').style.display = 'flex';
    }, 5000);
}

function startGame() {
    document.getElementById('instructions').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    loadObjects();
}

function loadObjects() {
    const container = document.getElementById('objects');
    container.innerHTML = '';
    currentIndex = 0;
    attempts = 0;

    objectsData.forEach(obj => {
        const div = document.createElement('div');
        div.classList.add('object');
        div.setAttribute('draggable', true);
        div.style.backgroundImage = `url('${obj.image}')`;
        div.dataset.color = obj.color;

        div.addEventListener('dragstart', dragStart);
        container.appendChild(div);
    });
}

function dragStart(e) {
    e.dataTransfer.setData('text/plain', e.target.dataset.color);
    this.classList.add('dragging');
}

const buckets = document.querySelectorAll('.bucket');
buckets.forEach(bucket => {
    bucket.addEventListener('dragover', dragOver);
    bucket.addEventListener('drop', dropObject);
});

function dragOver(e) {
    e.preventDefault();
}

function dropObject(e) {
    const color = e.dataTransfer.getData('text/plain');
    const targetColor = this.dataset.color;
    const draggedEl = document.querySelector('.object.dragging');

    if (color === targetColor) {
        document.getElementById('correctSound').play();
        draggedEl.remove();
        if (document.querySelectorAll('.object').length === 0) {
            document.getElementById('game').style.display = 'none';
            document.getElementById('end').style.display = 'flex';
            document.getElementById('clapSound').play();
        }
    } else {
        attempts++;
        document.getElementById('wrongSound').play();
        draggedEl.style.transform = 'translateX(10px)';
        setTimeout(() => draggedEl.style.transform = 'translateX(0px)', 200);
        if (attempts >= 2) {
            draggedEl.remove();
        }
    }
    draggedEl.classList.remove('dragging');
}

function restartGame() {
    document.getElementById('end').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    loadObjects();
}

showSplash();
</script>

</body>
</html>
